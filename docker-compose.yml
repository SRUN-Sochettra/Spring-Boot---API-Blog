version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: api_blog_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: api_blog
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d api_blog"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: api_blog_app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/api_blog
      SPRING_DATASOURCE_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-your_very_secure_jwt_secret_key_which_must_be_long_enough}
      PINATA_API_KEY: ${PINATA_API_KEY:-your_pinata_api_key}
      PINATA_SECRET_KEY: ${PINATA_SECRET_KEY:-your_pinata_secret_key}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
